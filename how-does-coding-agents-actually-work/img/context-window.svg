<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="filled" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="40%" stop-color="#4a9eff"/>
      <stop offset="60%" stop-color="#ff9f43"/>
      <stop offset="85%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- Container -->
  <rect x="50" y="40" width="700" height="60" rx="8" fill="none" stroke="#666" stroke-width="2"/>
  <!-- Filled portion -->
  <rect x="52" y="42" width="595" height="56" rx="6" fill="url(#filled)" opacity="0.8"/>
  <!-- Labels -->
  <text x="120" y="75" fill="white" font-family="monospace" font-size="14" font-weight="bold">System Prompt</text>
  <text x="310" y="75" fill="white" font-family="monospace" font-size="14" font-weight="bold">Conversation</text>
  <text x="500" y="75" fill="white" font-family="monospace" font-size="14" font-weight="bold">Tool Results</text>
  <text x="665" y="75" fill="#888" font-family="monospace" font-size="14">Free</text>
  <!-- Capacity label -->
  <text x="400" y="140" fill="#888" font-family="sans-serif" font-size="16" text-anchor="middle">Context Window (100K–200K tokens)</text>
  <!-- Arrow showing it fills up -->
  <text x="400" y="170" fill="#ff6b6b" font-family="sans-serif" font-size="14" text-anchor="middle">← fills up over time →</text>
</svg>
